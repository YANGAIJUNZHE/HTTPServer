<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>登录 - jdbhttpd</title>
<style>
body{font-family:sans-serif;max-width:400px;margin:60px auto;padding:20px;background:#fafafa}
h2{text-align:center;color:#333}
form{background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
label{display:block;margin:12px 0 4px;color:#555}
input[type=text],input[type=password]{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box;font-size:14px}
input[type=submit]{width:100%;margin-top:20px;padding:12px;background:#06c;color:#fff;border:none;border-radius:4px;font-size:16px;cursor:pointer}
input[type=submit]:hover{background:#05b}
.footer{text-align:center;margin-top:16px;font-size:14px;color:#888}
.footer a{color:#06c}
</style>
</head>
<body>
<h2>🔐 用户登录</h2>
<form method="POST" action="/login">
<label for="username">用户名</label>
<input type="text" id="username" name="username" required>
<label for="password">密码</label>
<input type="password" id="password" name="password" required>
<input type="submit" value="登录">
</form>
<p class="footer">还没有账号？<a href="/register.html">注册新账号</a></p>
</body>
</html>
